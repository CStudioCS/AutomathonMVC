name: Multi-Platform Release

on:
  push:
    branches:
      - actions

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            unity-target: StandaloneWindows64
            dotnet-target: win-x64
            zip-name: Automathon_Win64
          - os: ubuntu-latest
            unity-target: StandaloneLinux64
            dotnet-target: linux-x64
            zip-name: Automathon_Linux
          - os: macos-latest
            unity-target: StandaloneOSX
            dotnet-target: osx-arm64
            zip-name: Automathon_Osx_ARM64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Unity Library Cache
        uses: actions/cache/restore@v4
        with:
          path: AutomathonUnity/Library
          key: Library-${{ runner.os }}-${{ matrix.unity-target }}-${{ hashFiles('AutomathonUnity/Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.unity-target }}-
            Library-${{ runner.os }}-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ./AutomathonUnity
          targetPlatform: ${{ matrix.unity-target }}
          buildName: AutomathonGame
          # Output to a temporary folder first
          buildsPath: ./UnityBuildTemp

      # 1. Fix the permissions FIRST so we are allowed to move the files
      - name: Fix Directory Permissions (Linux Only)
        if: runner.os == 'Linux'
        run: sudo chown -R $USER:$USER ./UnityBuildTemp

      # 2. Restructure files into a named subfolder to prevent zip clutter
      - name: Restructure Unity Build Folder
        shell: bash
        run: |
          mkdir -p ./Build/${{ matrix.zip-name }}
          mv ./UnityBuildTemp/${{ matrix.unity-target }}/* ./Build/${{ matrix.zip-name }}/
          rm -rf ./UnityBuildTemp

      - name: Save Unity Library Cache
        uses: actions/cache/save@v4
        with:
          path: AutomathonUnity/Library
          key: Library-${{ runner.os }}-${{ matrix.unity-target }}-${{ hashFiles('AutomathonUnity/Packages/manifest.json') }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Compile Headless directly into the clean subfolder
      - name: Build C# Project
        run: >
          dotnet publish ./Headless/Headless.csproj 
          -r ${{ matrix.dotnet-target }} 
          -c Release 
          -o ./Build/${{ matrix.zip-name }}/Headless 
          -p:PublishSingleFile=true 
          -p:PublishReadyToRun=true 
          -p:PublishTrimmed=true 
          --self-contained true

      # 4. Copy Python folder into the clean subfolder
      - name: Copy Python Folder
        shell: bash
        run: cp -r ./PythonAI ./Build/${{ matrix.zip-name }}/PythonAI

      # 5. Zip the named folder from Windows (creates a clean root folder in the zip)
      - name: Zip the Final Folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ./Build/${{ matrix.zip-name }} -DestinationPath ./${{ matrix.zip-name }}.zip

      # 6. Zip the named folder from Mac/Linux (creates a clean root folder in the zip)
      - name: Zip the Final Folder (Mac/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: cd Build && zip -r ../${{ matrix.zip-name }}.zip ./${{ matrix.zip-name }} && cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prerelease-${{ github.sha }}
          name: Prerelease Build ${{ github.sha }}
          prerelease: true
          files: ${{ matrix.zip-name }}.zip