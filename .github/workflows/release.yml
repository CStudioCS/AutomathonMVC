name: Multi-Platform Release

on:
  push:
    branches:
      - actions

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            unity-target: StandaloneWindows64
            dotnet-target: win-x64
            zip-name: Automathon_Win64
          - os: ubuntu-latest
            unity-target: StandaloneLinux64
            dotnet-target: linux-x64
            zip-name: Automathon_Linux
          - os: macos-latest
            unity-target: StandaloneOSX
            dotnet-target: osx-arm64
            zip-name: Automathon_Osx_ARM64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Unity Library Cache
        uses: actions/cache/restore@v4
        with:
          path: AutomathonUnity/Library
          key: Library-${{ runner.os }}-${{ matrix.unity-target }}-${{ hashFiles('AutomathonUnity/Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.unity-target }}-
            Library-${{ runner.os }}-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ./AutomathonUnity
          targetPlatform: ${{ matrix.unity-target }}
          buildName: AutomathonGame
          # Output to a temporary folder first
          buildsPath: ./UnityBuildTemp

      - name: Restructure Unity Build Folder
        shell: bash
        # Move the contents out of the target platform subfolder into the final Build folder
        run: |
          mkdir -p ./Build
          mv ./UnityBuildTemp/${{ matrix.unity-target }}/* ./Build/
          rm -rf ./UnityBuildTemp

      - name: Save Unity Library Cache
        uses: actions/cache/save@v4
        with:
          path: AutomathonUnity/Library
          key: Library-${{ runner.os }}-${{ matrix.unity-target }}-${{ hashFiles('AutomathonUnity/Packages/manifest.json') }}

      - name: Fix Directory Permissions (Linux Only)
        if: runner.os == 'Linux'
        run: sudo chown -R $USER:$USER ./Build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# Project
        # Added the properties from your Visual Studio image to create a trimmed, single-file executable
        run: >
          dotnet publish ./Headless/Headless.csproj 
          -r ${{ matrix.dotnet-target }} 
          -c Release 
          -o ./Build/Headless 
          -p:PublishSingleFile=true 
          -p:PublishReadyToRun=true 
          -p:PublishTrimmed=true 
          --self-contained true

      - name: Copy Python Folder
        shell: bash
        run: cp -r ./PythonAI ./Build/PythonAI

      - name: Zip the Final Folder
        shell: bash
        # cd into Build to zip the contents directly, avoiding a redundant root folder inside the zip
        run: cd Build && zip -r ../${{ matrix.zip-name }}.zip ./* && cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prerelease-${{ github.sha }}
          name: Prerelease Build ${{ github.sha }}
          prerelease: true
          files: ${{ matrix.zip-name }}.zip