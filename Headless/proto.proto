syntax = "proto3";

service GymService {
  rpc Step (Action) returns (StepResponse);
  rpc Reset(Empty) returns (Empty);
}

message DoubleAction{
  Action action1;
  Action action2;
}

message Action {
  int movingDirX = 1;
  int movingDirY = 2;
  int aimingDirX = 3;
  int aimingDirY = 4;
  bool machineGun = 5;
  bool missile = 6;
  bool shield = 7;
  bool dash = 8;
  int dashDirectionX = 9;
  int dashDirectionY = 10;
}

message Empty {
}

message StepResponse {
  repeated float observation = 1;
  bool done = 2;
}